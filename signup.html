<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>Bank.com</title>
</head>
<body>
    <div class="wrapper">
        <section>
           <div class="section">
            <h1>adventure starts</h1>
            <h1>here</h1>
            <h3>create an account to join our community</h3>
           </div>
            <div class="direct">
                <img src="image/Vector.png" alt="direction-image" >
            </div>
        </section>
        <aside>
            <img src="image/d-logo.svg" alt="">
            <h2>hello, welcome back!</h2>
            <form action="">
               <div class="email">
                <label for="email">Email</label>
                <input type="email" name="" id="email" placeholder="Enter your email address">
                <img src="image/Email.svg" alt="mail-image">
               </div>
                <div class="password">
                <label for="password">Password</label>
                <input type="password" name="" id="password" placeholder="Enter in your password">
                <img src="image/Lock.svg" alt="lock-image">
                <input type="checkbox" name="" id="check">
                <label for="check" class="label">Remember me</label>
                <p>reset password</p>
                <input type="submit" value="sign up">
                <p>
                    <hr>
                    or
                    <hr>
                </p>
                </div>
                <div class="img">
                    <img src="image/google.png" alt="">
                    <img src="image/facebook2.png" alt="">
                    <img src="image/apple.png" alt="">
                </div>
                <p>Already have an account?  <a href="#"> sign in</a></p>
            
                
               
            </form>
        </aside>
    </div>
</body>
</html>
